<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CarQR info</title><link rel="stylesheet" href="style.css"></head><body><div class="card"><h2>Mashina ma'lumotlari</h2><p id="name"></p><p id="car"></p><p id="number"></p><button id="call">Qo'ng'iroq qilish</button></div><script>let params=new URLSearchParams(window.location.search)let name=params.get("name")let car=params.get("car")let number=params.get("number")let phone=params.get("phone")document.getElementById("name").innerText="Ism: "+namedocument.getElementById("car").innerText="Mashina: "+cardocument.getElementById("number").innerText="Raqam: "+numberdocument.getElementById("call").onclick=function(){window.location.href="tel:"+phone}</script></body></html>
